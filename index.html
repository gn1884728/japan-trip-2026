<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 秋季家族自駕遊</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f4f6f8; }
        .header { background: #1E3A8A; color: white; padding: 15px; text-align: center; }
        /* 隱藏 Radio 按鈕，用它們來控制頁面顯示 */
        .tab-radio { display: none; }
        .page { display: none; padding: 15px; }
        #tab1:checked ~ #page1, #tab2:checked ~ #page2, #tab3:checked ~ #page3, #tab4:checked ~ #page4 { display: block; }
        /* 導航列 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; }
        .nav-label { flex: 1; text-align: center; padding: 12px 0; font-size: 12px; font-weight: bold; color: #94a3b8; cursor: pointer; }
        #tab1:checked ~ .nav-bar label[for="tab1"], #tab2:checked ~ .nav-bar label[for="tab2"], #tab3:checked ~ .nav-bar label[for="tab3"], #tab4:checked ~ .nav-bar label[for="tab4"] { color: #1E3A8A; }
        /* 卡片樣式 */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #1E3A8A; }
        .btn-map { display: block; background: #4285F4; color: white; padding: 10px; text-align: center; border-radius: 6px; text-decoration: none; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <!-- Radio 按鈕控制系統 -->
    <input type="radio" name="tabs" id="tab1" class="tab-radio" checked>
    <input type="radio" name="tabs" id="tab2" class="tab-radio">
    <input type="radio" name="tabs" id="tab3" class="tab-radio">
    <input type="radio" name="tabs" id="tab4" class="tab-radio">

    <div class="header"><h1>🍁 2026 秋季家族自駕遊</h1></div>

    <div id="page1" class="page">
        <div style="font-weight:bold; margin-bottom:10px;">📅 行程</div>
        <div class="card">10/25 星宇商務 ➔ 10/26 仙台取車 ➔ 10/28 新青森還車 ➔ 10/29 關東自駕...</div>
    </div>
    <div id="page2" class="page">
        <div style="font-weight:bold; margin-bottom:10px;">🍔 美食</div>
        <div class="card">善治郎牛舌 | 松島烤牡蠣 | 中味噌拉麵 | café KITAMON</div>
    </div>
    <div id="page3" class="page">
        <div style="font-weight:bold; margin-bottom:10px;">🎟️ 票券</div>
        <div class="card">安比纜車 / Skyliner / 晴空塔 / 新幹線</div>
    </div>
    <div id="page4" class="page">
        <div style="font-weight:bold; margin-bottom:10px;">💰 帳本</div>
        <div class="card"><a href="https://docs.google.com/spreadsheets/d/1CxCyMKK4iY20Fgmr6g-xpsa0l1zmdcvknOJSB1eTelw/edit" class="btn-map">📊 開啟線上帳本</a></div>
    </div>

    <div class="nav-bar">
        <label for="tab1" class="nav-label">📅 行程</label>
        <label for="tab2" class="nav-label">🍔 美食</label>
        <label for="tab3" class="nav-label">🎟️ 票券</label>
        <label for="tab4" class="nav-label">💰 帳本</label>
    </div>
</body>
</html>
