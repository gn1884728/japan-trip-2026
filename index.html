<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 秋季家族自駕遊</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1E3A8A">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f6f8; margin: 0; padding-bottom: 80px; }
        .header { background-color: #1E3A8A; color: white; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .main-view { display: none; } .main-view.active { display: block; }
        .container { padding: 16px; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border-left: 4px solid #1E3A8A; }
        .date-header { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #0f172a; border-left: 4px solid #1E3A8A; padding-left: 8px;}
        .btn-checkin { display: block; width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-checkin.done { background: #94a3b8; cursor: default; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { cursor: pointer; color: #94a3b8; font-size: 12px; font-weight: 600; text-align: center; flex: 1; }
        .nav-item.active { color: #1E3A8A; }
    </style>
</head>
<body>

<div class="header"><h1>🍁 2026 秋季家族自駕遊</h1></div>

<div id="view-itinerary" class="main-view active">
    <div class="container">
        <div class="date-header">10/25 (日) | 星宇啟航</div>
        <div class="card">
            <div>JX862 11:50起飛，16:00到達仙台。</div>
            <button class="btn-checkin" onclick="checkIn(this)">📍 簽到：已抵達仙台</button>
        </div>
        </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchView('view-itinerary', this)">📅 行程</div>
    <div class="nav-item" onclick="switchView('view-food', this)">🍔 美食</div>
    <div class="nav-item" onclick="switchView('view-tickets', this)">🎟️ 票券</div>
    <div class="nav-item" onclick="switchView('view-expenses', this)">💰 帳本</div>
</div>

<script>
    function switchView(id, btn) {
        document.querySelectorAll('.main-view').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    }

    function checkIn(btn) {
        btn.innerText = "✅ 已於 " + new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute: '2-digit'}) + " 抵達";
        btn.classList.add('done');
        btn.disabled = true;
    }
</script>
</body>
</html>
