<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 秋季家族自駕遊</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding-bottom: 80px; }
        .header { background-color: #1E3A8A; color: white; padding: 16px; text-align: center; }
        .main-view { display: none; } .main-view.active { display: block; }
        .container { padding: 16px; }
        .tab-scroll-container { background-color: #1E3A8A; overflow-x: auto; white-space: nowrap; padding: 0 10px 10px; }
        .tab-btn { background: rgba(255,255,255,0.2); color: #cbd5e1; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; margin-right: 8px; cursor: pointer; }
        .tab-btn.active { background: white; color: #1E3A8A; font-weight: bold; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border-left: 4px solid #94a3b8; }
        .date-header { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #0f172a; }
        .btn-map { display: block; background: #4285F4; color: white; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { cursor: pointer; color: #94a3b8; font-size: 12px; text-align: center; }
        .nav-item.active { color: #1E3A8A; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h1>🍁 2026 秋季家族自駕遊</h1></div>

<div id="view-itinerary" class="main-view active">
    <div class="tab-scroll-container" id="day-tabs">
        </div>
    <div class="container" id="itinerary-content">
        <div class="date-header">10/28 (三) | 弘前賞楓 ➔ 上野大合體</div>
        <div class="card">
            <div class="event">新青森車站還車 🚗</div>
            <div class="desc">預計 11:30 還車，距離弘前約 40km (45分鐘)。</div>
            <a href="https://maps.app.goo.gl/ToyotaNewAomori" class="btn-map">📍 導航至 Toyota 新青森站前店</a>
        </div>
    </div>
</div>

<div id="view-food" class="main-view">
    <div class="container">
        <div class="date-header">🍔 美食清單</div>
        <div class="card">
            <div class="event">仙台車站 善治郎牛舌</div>
            <a href="https://maps.app.goo.gl/SendaiZenjiro" class="btn-map">📍 導航</a>
        </div>
    </div>
</div>

<div id="view-tickets" class="main-view">
    <div class="container">
        <div class="date-header">🎟️ 票券中心</div>
    </div>
</div>

<div id="view-expenses" class="main-view">
    <div class="container">
        <div class="date-header">💰 帳本</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchView('view-itinerary', this)">📅 行程</div>
    <div class="nav-item" onclick="switchView('view-food', this)">🍔 美食</div>
    <div class="nav-item" onclick="switchView('view-tickets', this)">🎟️ 票券</div>
    <div class="nav-item" onclick="switchView('view-expenses', this)">💰 帳本</div>
</div>

<script>
    function switchView(id, btn) {
        document.querySelectorAll('.main-view').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    }
    function showDay(id, btn) {
        document.querySelectorAll('.day-content').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
